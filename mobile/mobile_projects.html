    .language{grid-column:1/3;grid-row:4/7;background:#d7f5c6;transform:rotate(1.2deg)}
    .driving{grid-column:3/5;grid-row:4/7;background:#cfe8ff;transform:rotate(-.7deg)}

    .detailTags{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}.detailTags span{font-size:13px;font-weight:1000;border:3px solid var(--ink);background:#111;color:#fff;padding:6px 10px;}
    .dualBlock{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:14px}.dualBlock .infoBox{background:#fff8fb}.dualBlock h4{color:#c61d63}
    .galleryNote{position:absolute;right:18px;bottom:18px;z-index:2;background:#111;color:#ffe56b;border:3px solid #111;padding:8px 12px;font-weight:1000;font-size:13px;}
    .corner{position:absolute;z-index:1;width:130px;height:130px;border:5px solid var(--ink);background:var(--red);transform:rotate(12deg);opacity:.15}.corner.c1{right:70px;top:60px}.corner.c2{left:540px;bottom:30px;background:var(--blue);transform:rotate(-18deg)}
    .floatingDots{position:absolute;inset:0;pointer-events:none;z-index:1}.floatingDots i{position:absolute;width:13px;height:13px;border-radius:50%;background:#111;opacity:.12;animation:float 5s ease-in-out infinite}.floatingDots i:nth-child(1){left:22%;top:18%;background:#d43525}.floatingDots i:nth-child(2){left:78%;top:12%;animation-delay:1s}.floatingDots i:nth-child(3){left:66%;top:83%;background:#008cff;animation-delay:.5s}.floatingDots i:nth-child(4){left:41%;top:76%;background:#f15f9c;animation-delay:1.6s}.floatingDots i:nth-child(5){left:91%;top:61%;background:#eaff00;animation-delay:.9s}@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
    @media(max-width:1200px){html,body{overflow:auto}.page{height:auto;min-height:100vh;overflow:visible}.stage{height:auto;min-height:100vh;overflow:visible}.titleBlock{position:relative;left:26px;top:70px;margin-right:50px}.layout{position:relative;left:auto;right:auto;top:auto;bottom:auto;margin:100px 24px 36px;grid-template-columns:1fr}.cardWall{min-height:820px}.detailPanel{height:900px}.title{font-size:60px}.subtitle{font-size:15px}.return{position:fixed}.infoGrid,.dualBlock{grid-template-columns:1fr}}
  </style>

      ['otherasset/art-04.png','最终装置：红线、古钱、砂土和透明基座共同形成“束缚与流动”的视觉关系。']
    ],
    overview:'这一组将两个体量较轻但有实验价值的项目合并展示：前半部分是儿童玩具收纳与声音反馈原型，后半部分是围绕古钱、红线、铜网和透明材料展开的艺术装置实验。它们共同体现快速原型、材料选择、互动触发和概念表达能力。',
    focus:['玩具部分关注儿童收纳行为，通过定位与压力反馈引导玩具归位。','原型从瓦楞纸快速试错推进到灰板结构，提高稳定性与完成度。','艺术装置部分用铜钱、红线、砂土和透明底盘建立材料隐喻。','机械结构与手工材料并置，形成“古老符号 + 可运动装置”的观看体验。'],
    role:'完成玩具原型结构、传感反馈设想、迭代记录，以及艺术装置的材料说明、草图推演和模型呈现。',
    dual:true
  }
];

let activeProject = 0;
let activeImage = 0;
const wall = document.getElementById('cardWall');
const detailIndex = document.getElementById('detailIndex');
const detailTitle = document.getElementById('detailTitle');
const detailEn = document.getElementById('detailEn');
const detailBody = document.getElementById('detailBody');

function renderCards(){
  wall.innerHTML = projects.map((p,i)=>`
    <article class="projectCard ${p.cls} ${i===activeProject?'active':''}" data-index="${i}">
      <div>
        <div class="num">${p.no}</div>
        <h3>${p.title}</h3>
        <p>${p.short}</p>
      </div>
      <div>
        <div class="thumb"><img src="${p.cover}" alt="${p.title}"></div>
        <div class="tags">${p.tags.slice(0,4).map(t=>`<span class="tag">${t}</span>`).join('')}</div>
      </div>
    </article>
  `).join('');
  document.querySelectorAll('.projectCard').forEach(card=>{
    card.addEventListener('click',()=>{
      activeProject = Number(card.dataset.index);
      activeImage = 0;
      renderCards();
      renderDetail();
    });
  });
}

function renderDetail(){
  const p = projects[activeProject];
  const img = p.images[activeImage];
  detailIndex.textContent = p.no;
  detailTitle.textContent = p.title;
  detailEn.textContent = p.en;
  detailBody.innerHTML = `
    <div class="heroBox">
      <img id="heroImage" src="${img[0]}" alt="${p.title}">
      <div class="galleryNote">${activeImage+1} / ${p.images.length}</div>
    </div>
    <div class="caption" id="caption">${img[1]}</div>
    <div class="miniStrip">
      ${p.images.map((item,i)=>`<button class="${i===activeImage?'active':''}" data-img="${i}" title="${item[1]}"><img src="${item[0]}" alt="图 ${i+1}"></button>`).join('')}
    </div>
    <div class="infoGrid">
      <div class="infoBox wide">
        <h4>项目概述</h4>
        <p>${p.overview}</p>
      </div>
      <div class="infoBox">
        <h4>设计重点</h4>
        <ul>${p.focus.map(x=>`<li>${x}</li>`).join('')}</ul>
      </div>
      <div class="infoBox">
        <h4>我的工作</h4>
        <p>${p.role}</p>
        <div class="detailTags">${p.tags.map(t=>`<span>${t}</span>`).join('')}</div>
      </div>
      ${p.dual ? `
      <div class="dualBlock wide">
        <div class="infoBox">
          <h4>梦回童趣</h4>
          <p>以“孩子们的字典 / 第一节书 / 朋友 / 梦想之源”为叙事核心，采用灰板与可折叠开口结构。底部用磁力传感提示玩具归位，背部用压力传感触发声音或画面联想，把收纳动作转化为带反馈的游戏仪式。</p>
        </div>
        <div class="infoBox">
          <h4>与古遥望</h4>
          <p>装置以铜钱底色、密集铜网、青铜面具、红线、底部埋沙与透明底盘构成材料语言。红线像鳞片也像束缚，古钱与砂土带出“生与灭”的时间感，机械联动则让静态材料产生可观看的运动关系。</p>
        </div>
      </div>` : ''}
    </div>
  `;
  detailBody.querySelectorAll('.miniStrip button').forEach(btn=>{
    btn.addEventListener('click',()=>{
      activeImage = Number(btn.dataset.img);
      renderDetail();
    });
  });
  detailBody.scrollTop = 0;
}

renderCards();
renderDetail();
</script>
  <script src="mobile_common.js"></script>
  <script src="mobile_projects.js"></script>
</body>
</html>
