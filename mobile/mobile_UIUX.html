<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<script src="../device-router.js"></script>
<title>战前准备整合演示 v5</title>
  <link rel="icon" type="image/png" href="../assets/favicon.png">
  <link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
<style>
  :root{ --gold:#d9b863; --bg:#050505; --frame-w:2048; --frame-h:923; }
  *{box-sizing:border-box}
  html,body{margin:0;width:100%;height:100%;overflow:hidden;background:radial-gradient(circle at center,#1a1814 0%,#070707 60%,#000 100%);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;user-select:none}
  body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:1000;background:repeating-linear-gradient(to bottom,rgba(255,255,255,.022) 0,rgba(255,255,255,.022) 1px,transparent 2px,transparent 5px);opacity:.34;mix-blend-mode:screen}
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  #frame{position:relative;width:min(100vw, calc(100vh * var(--ratio, 2.1626)));height:min(100vh, calc(100vw / var(--ratio, 2.1626)));background:#000;overflow:hidden;box-shadow:0 20px 90px rgba(0,0,0,.82)}
  #screen{position:absolute;inset:0;width:100%;height:100%;object-fit:fill;opacity:1;transition:opacity .24s ease,filter .24s ease,transform .24s ease;z-index:1}
  #screen.fade-out{opacity:0;filter:brightness(.58);transform:scale(1.01)}
  #hotspots{position:absolute;inset:0;z-index:120;pointer-events:none}
  .hotspot{position:absolute;border:0;padding:0;background:rgba(255,255,255,0);cursor:pointer;-webkit-tap-highlight-color:transparent;pointer-events:auto}
  .hotspot:focus{outline:none}
  .hotspot.debug{background:rgba(255,214,90,.14);outline:1px solid rgba(255,214,90,.7)}
  .pulse-click{position:absolute;z-index:130;pointer-events:none;width:60px;height:60px;margin-left:-30px;margin-top:-30px;border-radius:50%;border:2px solid rgba(217,184,99,.95);animation:pulseClick .45s ease-out forwards}
  @keyframes pulseClick{from{transform:scale(.25);opacity:1}to{transform:scale(1.8);opacity:0}}
  #loading{position:absolute;inset:0;z-index:180;display:none;align-items:center;justify-content:center;flex-direction:column;background:#030302;color:rgba(255,255,255,.8);overflow:hidden}
  #loading.show{display:flex}
  #loading::before{content:"";position:absolute;inset:-35%;background:linear-gradient(rgba(217,184,99,.055) 1px,transparent 1px),linear-gradient(90deg,rgba(217,184,99,.055) 1px,transparent 1px);background-size:32px 32px;transform:perspective(360px) rotateX(63deg) translateY(16%);animation:gridMove 1.1s linear infinite}
  #loading::after{content:"";position:absolute;left:0;right:0;top:-30%;height:22%;background:linear-gradient(to bottom,transparent,rgba(217,184,99,.16),transparent);animation:scan 1.2s ease-in-out infinite}
  @keyframes gridMove{from{background-position:0 0}to{background-position:0 64px}}
  @keyframes scan{from{transform:translateY(0)}to{transform:translateY(680%)}}
  .loading-title{position:relative;z-index:2;color:#ffe59a;font-size:clamp(16px,2vw,28px);letter-spacing:.18em;text-shadow:0 0 16px rgba(217,184,99,.55);margin-bottom:18px}
  .loading-sub{position:relative;z-index:2;font-size:clamp(10px,1vw,15px);color:rgba(255,255,255,.55);letter-spacing:.1em;margin-bottom:26px}
  .bar{position:relative;z-index:2;width:42%;height:8px;border:1px solid rgba(217,184,99,.68);background:rgba(255,255,255,.04);overflow:hidden}
  .bar span{display:block;width:0;height:100%;background:linear-gradient(90deg,rgba(217,184,99,.28),#ffe59a);animation:loadBar .75s ease-out forwards}
  @keyframes loadBar{to{width:100%}}
  #cardOverlay{position:absolute;inset:0;z-index:140;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.18);backdrop-filter:blur(1.5px)}
  #cardOverlay.show{display:flex;animation:overlayIn .22s ease-out both}
  @keyframes overlayIn{from{opacity:0}to{opacity:1}}
  .operation-card{position:relative;width:61.5%;aspect-ratio:1258/706;transform:translateY(1%);filter:drop-shadow(0 30px 45px rgba(0,0,0,.75));animation:cardIn .24s ease-out both}
  @keyframes cardIn{from{opacity:0;transform:translateY(4%) scale(.96)}to{opacity:1;transform:translateY(1%) scale(1)}}
  .operation-card img{width:100%;height:100%;display:block}
  .card-btn{position:absolute;left:59%;top:74%;width:36%;height:18%;z-index:50;background:rgba(255,255,255,0);border:0;cursor:pointer}
  .toast{position:absolute;left:50%;bottom:4.5%;z-index:200;transform:translateX(-50%);padding:10px 18px;min-width:260px;text-align:center;color:#ffe59a;font-size:14px;letter-spacing:.07em;border:1px solid rgba(217,184,99,.75);background:rgba(0,0,0,.82);box-shadow:0 0 24px rgba(217,184,99,.15);opacity:0;pointer-events:none}
  .toast.show{animation:toast .95s ease both}
  @keyframes toast{0%{opacity:0;transform:translate(-50%,10px)}16%,80%{opacity:1;transform:translate(-50%,0)}100%{opacity:0;transform:translate(-50%,-4px)}}
  .hint{position:absolute;left:50%;top:10px;transform:translateX(-50%);z-index:130;color:rgba(255,255,255,.42);font-size:13px;letter-spacing:.08em;text-shadow:0 1px 4px #000;pointer-events:none}

  /* 装备拖拽层 */
  #equipLayer{position:absolute;inset:0;z-index:60;display:none;pointer-events:none}
  #equipLayer.active{display:block;pointer-events:auto}
  .equip-item{position:absolute;z-index:65;display:block;object-fit:contain;touch-action:none;cursor:grab;filter:drop-shadow(0 8px 12px rgba(0,0,0,.75));transition:filter .15s ease,opacity .2s ease}
  .equip-item.dragging{cursor:grabbing;filter:drop-shadow(0 14px 22px rgba(0,0,0,.9)) brightness(1.18);z-index:100;transition:none}
  .placed-flash{animation:placed .45s ease both}
  @keyframes placed{0%{filter:brightness(1)}45%{filter:brightness(1.8) drop-shadow(0 0 18px rgba(217,189,112,.7))}100%{filter:brightness(1)}}
  #finalCover{position:absolute;inset:0;width:100%;height:100%;object-fit:fill;z-index:90;opacity:0;pointer-events:none;transition:opacity .45s ease}
  #finalCover.show{opacity:1}

  #portfolioBack{position:fixed;left:18px;top:18px;z-index:1400;text-decoration:none;color:#ffe59a;background:rgba(0,0,0,.72);border:1px solid rgba(217,184,99,.78);box-shadow:0 0 22px rgba(217,184,99,.18);padding:10px 14px;border-radius:999px;font-size:14px;font-weight:900;letter-spacing:.04em;backdrop-filter:blur(8px)}
  #portfolioBack:hover{background:rgba(217,184,99,.16);color:#fff0bd}

</style>
<link rel="stylesheet" href="mobile_UIUX.css" />
</head>
<body>
  <a id="portfolioBack" href="mobile_index.html?page=map">← 返回作品地图</a>
  <div id="stage">
    <div id="frame">
      <img id="screen" src="../UIasset/1.png" alt="交互画面">
      <div id="equipLayer"></div>
      <img id="finalCover" src="../UIasset/4NEW.png" alt="装备整备完成">
      <div id="hotspots"></div>
      <div class="hint">点击热区查看流程</div>

      <div id="cardOverlay">
        <div class="operation-card">
          <img src="../UIasset/2-1.png" alt="当前部署计划">
          <button class="card-btn" data-action="card-start" aria-label="进入部署"></button>
        </div>
      </div>

      <div id="loading">
        <div class="loading-title">战前部署终端连接中</div>
        <div class="loading-sub">FRONTLINE DEPLOYMENT TERMINAL / FLOW LOADING</div>
        <div class="bar"><span></span></div>
      </div>
      <div class="toast" id="toast"></div>
    </div>
  </div>

<script>
  const IMAGES = {
    home:'../UIasset/1.png',
    memberAll:'../UIasset/3.png', memberAssault:'../UIasset/3-1.png', dwolfStatus:'../UIasset/3-2.png', liProfile:'../UIasset/3-3.png', liStatus:'../UIasset/3-4.png',
    equipmentEmpty:'../UIasset/4-1.png', equipmentFinal:'../UIasset/4NEW.png',
    shopEntry:'../UIasset/5-1.png', shopTyping:'../UIasset/5-4.png', shopResults:'../UIasset/5-2.png', shopDetail:'../UIasset/5-3.png',
    workshop:'../UIasset/6.png', workshopMuzzle:'../UIasset/6-1.png', workshopApplied:'../UIasset/6-2.png',
    departure:'../UIasset/7.png',
    mapBase:'../UIasset/2.png', operationCard:'../UIasset/2-1.png', mapSelected:'../UIasset/2-2.png', supply:'../UIasset/2-3.png', suppress:'../UIasset/2-4.png', repair:'../UIasset/2-5.png', intel:'../UIasset/2-6.png'
  };
  const SIZE = {
    '1.png':[2048,947], '7.png':[2048,947],
    '3.png':[2048,923], '3-1.png':[2048,923], '3-2.png':[2048,923], '3-3.png':[2048,923], '3-4.png':[2048,923], '4-1.png':[2048,923], '4NEW.png':[2048,923],
    '5-1.png':[2048,921], '5-4.png':[2048,921], '5-2.png':[2048,921], '5-3.png':[2048,921],
    '6.png':[2048,921], '6-1.png':[2048,921], '6-2.png':[2048,921],
    '2.png':[2048,921], '2-2.png':[2048,921], '2-3.png':[2048,921], '2-4.png':[2048,921], '2-5.png':[2048,921], '2-6.png':[2048,921]
  };

  const DESIGN = { w:2048, h:923 };
  const frame = document.getElementById('frame');
  const screen = document.getElementById('screen');
  const hotspots = document.getElementById('hotspots');
  const loading = document.getElementById('loading');
  const cardOverlay = document.getElementById('cardOverlay');
  const toast = document.getElementById('toast');
  const equipLayer = document.getElementById('equipLayer');
  const finalCover = document.getElementById('finalCover');
  const DEBUG_HOTSPOTS = false;
  let current = 'home';
  let equipmentComplete = false;
  let equipInited = false;
  const placed = new Set();

  function setRatioByFile(file){ const key = String(file).split('/').pop(); const [w,h] = SIZE[key] || [2048,923]; frame.style.setProperty('--ratio', w / h); }
  function clearHotspots(){ hotspots.innerHTML = ''; }
  function addHotspot({x,y,w,h,action,label}){
    const btn = document.createElement('button');
    btn.className = 'hotspot' + (DEBUG_HOTSPOTS ? ' debug' : '');
    btn.style.left = x + '%'; btn.style.top = y + '%'; btn.style.width = w + '%'; btn.style.height = h + '%';
    btn.dataset.action = action; btn.setAttribute('aria-label', label || action); hotspots.appendChild(btn); return btn;
  }
  function clickPulse(clientX, clientY){ const rect = frame.getBoundingClientRect(); const p=document.createElement('div'); p.className='pulse-click'; p.style.left=(clientX-rect.left)+'px'; p.style.top=(clientY-rect.top)+'px'; frame.appendChild(p); setTimeout(()=>p.remove(),500); }
  function showToast(text){ toast.textContent=text; toast.classList.remove('show'); void toast.offsetWidth; toast.classList.add('show'); }
  function hideEquipmentLayer(){ equipLayer.classList.remove('active'); finalCover.classList.remove('show'); }
  function switchImage(file, after){
    hideEquipmentLayer();
    screen.classList.add('fade-out'); clearHotspots();
    setTimeout(()=>{ screen.src=file; setRatioByFile(file); const done=()=>{ screen.classList.remove('fade-out'); if(after) after(); }; screen.onload=done; if(screen.complete) done(); },160);
  }
  function goLoadingThen(nextSetup){ loading.classList.add('show'); clearHotspots(); setTimeout(()=>{ loading.classList.remove('show'); nextSetup(); },850); }

  function showHome(){ current='home'; cardOverlay.classList.remove('show'); switchImage(IMAGES.home,()=>addHotspot({x:72.0,y:76.3,w:22.5,h:13.2,action:'home-start',label:'开始部署'})); }

  function addMemberCommonHotspots(){ addHotspot({x:75.0,y:84.0,w:21.5,h:10.0,action:'member-next',label:'下一步：装备整备'}); }
  function showMemberAll(){ current='memberAll'; switchImage(IMAGES.memberAll,()=>{addMemberCommonHotspots(); addHotspot({x:4.2,y:32.0,w:5.0,h:10.0,action:'member-assault',label:'切换突击'});}); }
  function showMemberAssault(){ current='memberAssault'; switchImage(IMAGES.memberAssault,()=>{addMemberCommonHotspots(); addHotspot({x:4.2,y:19.0,w:5.0,h:10.0,action:'member-all',label:'切换全员'}); addHotspot({x:85.0,y:22.0,w:10.5,h:8.0,action:'dwolf-status',label:'查看 D-WOLF 状态'});}); }
  function showDwolfStatus(){ current='dwolfStatus'; switchImage(IMAGES.dwolfStatus,()=>{addMemberCommonHotspots(); addHotspot({x:4.2,y:19.0,w:5.0,h:10.0,action:'member-all',label:'切换全员'}); addHotspot({x:4.2,y:32.0,w:5.0,h:10.0,action:'member-assault',label:'切换突击'}); addHotspot({x:75.0,y:22.0,w:10.0,h:8.0,action:'member-assault',label:'查看 D-WOLF 档案'}); addHotspot({x:10.0,y:58.0,w:20.0,h:9.5,action:'li-profile',label:'选择 Li sir'});}); }
  function showLiProfile(){ current='liProfile'; switchImage(IMAGES.liProfile,()=>{addMemberCommonHotspots(); addHotspot({x:4.2,y:19.0,w:5.0,h:10.0,action:'member-all',label:'切换全员'}); addHotspot({x:4.2,y:32.0,w:5.0,h:10.0,action:'member-assault',label:'切换突击'}); addHotspot({x:10.0,y:19.0,w:20.0,h:9.5,action:'dwolf-status',label:'选择 D-WOLF'}); addHotspot({x:85.0,y:22.0,w:10.5,h:8.0,action:'li-status',label:'查看 Li sir 状态'});}); }
  function showLiStatus(){ current='liStatus'; switchImage(IMAGES.liStatus,()=>{addMemberCommonHotspots(); addHotspot({x:4.2,y:19.0,w:5.0,h:10.0,action:'member-all',label:'切换全员'}); addHotspot({x:4.2,y:32.0,w:5.0,h:10.0,action:'member-assault',label:'切换突击'}); addHotspot({x:10.0,y:19.0,w:20.0,h:9.5,action:'dwolf-status',label:'选择 D-WOLF'}); addHotspot({x:75.0,y:22.0,w:10.0,h:8.0,action:'li-profile',label:'查看 Li sir 档案'});}); }

  function showEquipment(){
    current='equipment'; cardOverlay.classList.remove('show');
    screen.classList.add('fade-out'); clearHotspots();
    setTimeout(()=>{
      screen.src=IMAGES.equipmentEmpty; setRatioByFile(IMAGES.equipmentEmpty);
      const done=()=>{ screen.classList.remove('fade-out'); equipLayer.classList.add('active'); initEquipment(); if(equipmentComplete){finalCover.classList.add('show'); addEquipmentFinalHotspots();} else {addHotspot({x:75.6,y:80.0,w:22.1,h:10.8,action:'equip-next',label:'下一步'});} };
      screen.onload=done; if(screen.complete) done();
    },160);
  }

  function addEquipmentFinalHotspots(){
    clearHotspots();
    // 4NEW 仓库标题栏两个按钮：左=商店，右=工坊。位置已按红圈修正。
    addHotspot({x:81.55,y:9.75,w:2.75,h:5.6,action:'open-shop',label:'打开商店'});
    addHotspot({x:85.05,y:9.75,w:2.75,h:5.6,action:'open-workshop',label:'打开工坊'});
    addHotspot({x:75.6,y:80.0,w:22.1,h:10.8,action:'to-departure',label:'下一步：出战确认'});
  }

  function showShopEntry(){ current='shopEntry'; switchImage(IMAGES.shopEntry,()=>{ addHotspot({x:2.1,y:3.0,w:9.2,h:6.8,action:'back-to-equipment',label:'返回大厅'}); addHotspot({x:16.8,y:63.1,w:10.8,h:4.4,action:'shop-typing',label:'输入关键词'}); }); }
  function showShopTyping(){ current='shopTyping'; switchImage(IMAGES.shopTyping,()=>{ addHotspot({x:2.1,y:3.0,w:9.2,h:6.8,action:'back-to-equipment',label:'返回大厅'}); addHotspot({x:27.7,y:63.0,w:4.0,h:4.6,action:'shop-send',label:'发送'}); }); }
  function showShopResults(){ current='shopResults'; switchImage(IMAGES.shopResults,()=>{ addHotspot({x:2.1,y:3.0,w:9.2,h:6.8,action:'back-to-equipment',label:'返回大厅'}); addHotspot({x:31.1,y:15.0,w:19.0,h:13.2,action:'shop-first-item',label:'第一个商品'}); }); }
  function showShopDetail(){ current='shopDetail'; switchImage(IMAGES.shopDetail,()=>{ addHotspot({x:2.1,y:3.0,w:9.2,h:6.8,action:'back-to-equipment',label:'返回大厅'}); }); }

  function showWorkshop(){ current='workshop'; switchImage(IMAGES.workshop,()=>{ addHotspot({x:1.3,y:2.0,w:7.2,h:7.0,action:'back-to-equipment',label:'返回装备页'}); addHotspot({x:20.4,y:20.8,w:5.4,h:10.4,action:'muzzle-slot',label:'枪口槽位'}); }); }
  function showWorkshopMuzzle(){ current='workshopMuzzle'; switchImage(IMAGES.workshopMuzzle,()=>{ addHotspot({x:1.3,y:2.0,w:7.2,h:7.0,action:'back-to-equipment',label:'返回装备页'}); addHotspot({x:1.2,y:13.9,w:14.7,h:11.0,action:'choose-first-suppressor',label:'选择第一个战术消音器'}); }); }
  function showWorkshopApplied(){ current='workshopApplied'; switchImage(IMAGES.workshopApplied,()=>{ addHotspot({x:1.3,y:2.0,w:7.2,h:7.0,action:'back-to-equipment',label:'返回装备页'}); }); }

  function showDeparture(){ current='departure'; switchImage(IMAGES.departure,()=>addHotspot({x:76.5,y:77.8,w:20.8,h:12.0,action:'to-map-flow',label:'出击'})); }
  function setupMapBase(){ current='mapBase'; cardOverlay.classList.remove('show'); switchImage(IMAGES.mapBase,()=>addHotspot({x:28.0,y:39.0,w:13.5,h:16.5,action:'north-zone',label:'北部工业区'})); }
  function setupMapSelected(){ current='mapSelected'; switchImage(IMAGES.mapSelected,addObjectiveHotspots); }
  function addObjectiveHotspots(){ addHotspot({x:79.0,y:25.0,w:17.5,h:11.0,action:'obj-supply',label:'物资回收'}); addHotspot({x:79.0,y:36.0,w:17.5,h:11.0,action:'obj-suppress',label:'战区压制'}); addHotspot({x:79.0,y:47.0,w:17.5,h:11.0,action:'obj-repair',label:'工程修复'}); addHotspot({x:79.0,y:58.0,w:17.5,h:11.0,action:'obj-intel',label:'情报侦察'}); }
  function setupMapSupply(){ current='mapSupply'; switchImage(IMAGES.supply,()=>{ addObjectiveHotspots(); addHotspot({x:72.0,y:78.8,w:22.5,h:11.0,action:'map-next-disabled',label:'下一步'}); }); }
  function setupMapOther(kind){ current=kind; const file=kind==='mapSuppress'?IMAGES.suppress:kind==='mapRepair'?IMAGES.repair:IMAGES.intel; switchImage(file,addObjectiveHotspots); }

  document.addEventListener('click',(e)=>{
    const target=e.target.closest('[data-action]'); if(!target) return; clickPulse(e.clientX,e.clientY); const action=target.dataset.action;
    if(action==='home-start') goLoadingThen(showMemberAll);
    if(action==='member-all') showMemberAll(); if(action==='member-assault') showMemberAssault(); if(action==='dwolf-status') showDwolfStatus(); if(action==='li-profile') showLiProfile(); if(action==='li-status') showLiStatus();
    if(action==='member-next'){ if(current==='liProfile'||current==='liStatus') showToast('Li sir 当前需要治疗，先不要出战'); else showEquipment(); }
    if(action==='equip-next'){ if(equipmentComplete){showDeparture();} else showToast('请先把关键装备放入对应槽位'); }
    if(action==='open-shop') showShopEntry(); if(action==='shop-typing') showShopTyping(); if(action==='shop-send') showShopResults(); if(action==='shop-first-item') showShopDetail();
    if(action==='open-workshop') showWorkshop(); if(action==='muzzle-slot') showWorkshopMuzzle(); if(action==='choose-first-suppressor') showWorkshopApplied();
    if(action==='back-to-equipment') showEquipment(); if(action==='to-departure') showDeparture(); if(action==='to-map-flow') goLoadingThen(setupMapBase);
    if(action==='north-zone') cardOverlay.classList.add('show');
    if(action==='card-start'){ cardOverlay.classList.remove('show'); setupMapSelected(); showToast('已选择战区：北部工业区'); }
    if(action==='obj-supply') setupMapSupply(); if(action==='obj-suppress') setupMapOther('mapSuppress'); if(action==='obj-repair') setupMapOther('mapRepair'); if(action==='obj-intel') setupMapOther('mapIntel');
    if(action==='map-next-disabled') showToast('地图选择完成，演示到此结束');
  });

  // ---- 装备拖拽逻辑 ----
  function pctX(x){return (x/DESIGN.w*100)+'%'} function pctY(y){return (y/DESIGN.h*100)+'%'} function pctW(w){return (w/DESIGN.w*100)+'%'} function pctH(h){return (h/DESIGN.h*100)+'%'}
  function setRect(el,r){ el.style.left=pctX(r.x); el.style.top=pctY(r.y); el.style.width=pctW(r.w); el.style.height=pctH(r.h); }
  function clientToDesign(clientX,clientY){ const r=frame.getBoundingClientRect(); return {x:(clientX-r.left)/r.width*DESIGN.w, y:(clientY-r.top)/r.height*DESIGN.h}; }
  const slots={
    T:{name:'头部装备',x:452,y:153,w:140,h:154}, FACE:{name:'面部装备',x:594,y:153,w:140,h:154}, P:{name:'耳机',x:766,y:153,w:132,h:154}, B:{name:'背包',x:900,y:153,w:158,h:332},
    J:{name:'防弹衣',x:552,y:311,w:172,h:178}, Z:{name:'主武器',x:452,y:500,w:325,h:142}, S:{name:'手枪',x:784,y:500,w:210,h:142}, F:{name:'副武器',x:452,y:642,w:325,h:142}, D:{name:'刀具',x:784,y:642,w:210,h:142}
  };
  const warehouseGrid={x:1104,y:151,cell:65,cols:12,rows:10};
  function gridRect(col,row,w,h){ return {x:warehouseGrid.x+col*warehouseGrid.cell, y:warehouseGrid.y+row*warehouseGrid.cell, w:w*warehouseGrid.cell, h:h*warehouseGrid.cell}; }
  const items=[
    Object.assign({id:'primary',src:'../UIasset/item_primary.png',slot:'Z',name:'M4A1 主武器'},gridRect(0,0,5,2)),
    Object.assign({id:'secondary',src:'../UIasset/item_secondary.png',slot:'F',name:'AK-74N 副武器'},gridRect(5,0,5,2)),
    Object.assign({id:'misc1',src:'../UIasset/item_misc1.png',slot:null,name:'闪光弹'},gridRect(10,0,1,1)),
    Object.assign({id:'misc2',src:'../UIasset/item_misc2.png',slot:null,name:'手雷'},gridRect(11,0,1,1)),
    Object.assign({id:'armor',src:'../UIasset/item_armor.png',slot:'J',name:'防弹衣'},gridRect(0,2,2,2)),
    Object.assign({id:'misc4',src:'../UIasset/item_misc4.png',slot:null,name:'止血包'},gridRect(2,2,2,2)),
    Object.assign({id:'misc5',src:'../UIasset/item_misc5.png',slot:null,name:'军用急救包'},gridRect(4,2,2,2)),
    Object.assign({id:'headset',src:'../UIasset/item_headset.png',slot:'P',name:'耳机'},gridRect(10,2,2,2)),
    Object.assign({id:'backpack',src:'../UIasset/item_backpack.png',slot:'B',name:'背包'},gridRect(5,4,3,2)),
    Object.assign({id:'face',src:'../UIasset/item_face.png',slot:'FACE',name:'面部装备'},gridRect(11,4,1,1)),
    Object.assign({id:'misc3',src:'../UIasset/item_misc3.png',slot:null,name:'弹匣'},gridRect(11,5,1,1)),
    Object.assign({id:'helmet',src:'../UIasset/item_helmet.png',slot:'T',name:'头盔'},gridRect(0,7,3,2)),
    Object.assign({id:'knife',src:'../UIasset/item_knife.png',slot:'D',name:'刀具'},gridRect(3,7,3,2)),
    Object.assign({id:'pistol',src:'../UIasset/item_pistol.png',slot:'S',name:'手枪'},gridRect(6,7,2,2))
  ];
  function initEquipment(){
    if(equipInited) return; equipInited=true;
    items.forEach(it=>{ const img=document.createElement('img'); img.className='equip-item'; img.src=it.src; img.alt=it.name; img.dataset.id=it.id; img.dataset.slot=it.slot||''; img.dataset.home=JSON.stringify({x:it.x,y:it.y,w:it.w,h:it.h}); setRect(img,it); equipLayer.appendChild(img); makeDrag(img,it); });
  }
  function getSlotAt(x,y){ return Object.entries(slots).find(([key,r])=>x>=r.x&&x<=r.x+r.w&&y>=r.y&&y<=r.y+r.h)?.[0]||null; }
  function makeDrag(el,it){
    let offset={x:0,y:0}, down=false;
    el.addEventListener('pointerdown',(e)=>{ if(el.dataset.placed==='1'||equipmentComplete) return; down=true; el.setPointerCapture(e.pointerId); const p=clientToDesign(e.clientX,e.clientY); const box=el.getBoundingClientRect(); const fr=frame.getBoundingClientRect(); const current={x:(box.left-fr.left)/fr.width*DESIGN.w,y:(box.top-fr.top)/fr.height*DESIGN.h}; offset={x:p.x-current.x,y:p.y-current.y}; el.classList.add('dragging'); });
    el.addEventListener('pointermove',(e)=>{ if(!down) return; const p=clientToDesign(e.clientX,e.clientY); const w=parseFloat(el.style.width)/100*DESIGN.w; const h=parseFloat(el.style.height)/100*DESIGN.h; const x=Math.max(0,Math.min(DESIGN.w-w,p.x-offset.x)); const y=Math.max(0,Math.min(DESIGN.h-h,p.y-offset.y)); setRect(el,{x,y,w,h}); el.dataset.x=x; el.dataset.y=y; });
    el.addEventListener('pointerup',(e)=>{ if(!down) return; down=false; el.classList.remove('dragging'); const p=clientToDesign(e.clientX,e.clientY); const target=getSlotAt(p.x,p.y); if(!it.slot){ showToast('这是路人道具，不需要放入战备槽位'); resetItem(el); return; } if(target===it.slot){ const r=slots[target]; setRect(el,r); el.dataset.placed='1'; el.classList.add('placed-flash'); placed.add(it.id); showToast(`${it.name} 已放入${r.name}`); checkDone(); } else { showToast(target?`不能放入${slots[target].name}，该物品只能放入${slots[it.slot].name}`:'请拖到对应装备槽位'); resetItem(el); } });
  }
  function resetItem(el){ const r=JSON.parse(el.dataset.home); setRect(el,r); el.dataset.x=r.x; el.dataset.y=r.y; }
  function checkDone(){ const required=items.filter(i=>i.slot).length; if(placed.size>=required){ equipmentComplete=true; setTimeout(()=>{ finalCover.classList.add('show'); equipLayer.classList.remove('active'); showToast('战备配置完成'); addEquipmentFinalHotspots(); },600); } }

  screen.addEventListener('dragstart', e=>e.preventDefault());
  setRatioByFile(IMAGES.home);
  showHome();
</script>
