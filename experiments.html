<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>更多实验</title><style>*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#3b0906,#d94b24,#f4dfaa);font-family:Impact,"Arial Black","Microsoft YaHei",Arial,sans-serif;color:#111}main{width:min(980px,88vw);padding:46px;background:#f4dfaa;border:7px solid #111;box-shadow:18px 18px 0 #111}h1{font-size:clamp(54px,8vw,120px);line-height:.9;color:#ffd21f;text-shadow:6px 6px 0 #111;margin-bottom:24px}p{font-family:"Microsoft YaHei",Arial,sans-serif;font-weight:900;font-size:22px;line-height:1.7;margin-bottom:28px}a{display:inline-block;padding:13px 18px;background:#111;color:#f4dfaa;text-decoration:none;font-family:"Microsoft YaHei",Arial,sans-serif;font-weight:900}</style></head><body><main><h1>更多实验</h1><p>这里可以放课程作业、概念实验、原型练习和小项目。</p><a href="index.html?page=2">← 返回划船地图</a></main><script>
(function () {
  const DEFAULT_RETURN = "index.html?page=2";
  const MAIN_PAGE_RE = /^(index|[2-7]index)\.html$/;

  function sameOriginRelative(value) {
    if (!value) return "";
    try {
      const url = new URL(value, window.location.href);
      if (url.origin !== window.location.origin) return "";
      const file = url.pathname.split("/").pop() || "index.html";
      return file + url.search + url.hash;
    } catch (error) {
      return "";
    }
  }

  const params = new URLSearchParams(window.location.search);
  let returnUrl = sameOriginRelative(params.get("from"));

  if (!returnUrl) {
    try {
      returnUrl = sameOriginRelative(sessionStorage.getItem("portfolioReturnUrl"));
    } catch (error) {}
  }

  if (!returnUrl && document.referrer) {
    try {
      const ref = new URL(document.referrer);
      const file = ref.pathname.split("/").pop() || "index.html";
      if (ref.origin === window.location.origin && MAIN_PAGE_RE.test(file)) {
        returnUrl = file + (ref.search || "?page=2") + ref.hash;
      }
    } catch (error) {}
  }

  if (!returnUrl) returnUrl = DEFAULT_RETURN;

  try {
    sessionStorage.setItem("portfolioReturnUrl", returnUrl);
  } catch (error) {}

  window.portfolioReturnUrl = returnUrl;

  document.querySelectorAll("a.return, a.back-home, a.back-link, #portfolioBack, a[href='index.html'], a[href^='index.html?page=']").forEach(function (link) {
    link.setAttribute("href", returnUrl);
  });
})();
</script>
</body></html>
